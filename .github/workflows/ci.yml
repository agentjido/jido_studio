name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    uses: agentjido/github-actions/.github/workflows/elixir-lint.yml@v3
    with:
      changelog_guard: false
      lint_command: >-
        mix format --check-formatted &&
        mix compile --warnings-as-errors &&
        mix credo --min-priority higher
      validate_hex_package: false

  test:
    name: Test
    uses: agentjido/github-actions/.github/workflows/elixir-test.yml@v3
    with:
      otp_versions: '["27", "28"]'
      elixir_versions: '["1.19"]'
      test_command: mix test
